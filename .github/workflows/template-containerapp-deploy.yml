# ------------------------------------------------------------------------------------------------------------------------
# GHA Reusable Called Workflow to deploy a Container App
# ------------------------------------------------------------------------------------------------------------------------
name: z_template_containerapp_deploy
run-name: Deploy Container App

on:
  workflow_call:
    inputs:
      envCode:
        required: true
        type: string
      containerImage:
        required: true
        type: string
        description: 'Full container image name (registry/image:tag)'

# ------------------------------------------------------------------------------------------------------------------------
jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.envCode }}

    env:
      generatedAppEnvName: "${{ inputs.envCode == 'prod' && format('{0}', vars.APP_NAME) || format('{0}{1}-{2}', vars.APP_NAME, vars.INSTANCE_NUMBER, inputs.envCode) }}"

    steps:
    - name: Login to Azure using OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Get Container App details
      id: get-containerapp
      shell: bash
      run: |
        CONTAINER_APP_NAME=$(az containerapp list --resource-group ${{ vars.RESOURCE_GROUP_NAME }} --query "[?contains(name, '${{ env.generatedAppEnvName }}')].name" -o tsv)
        echo "containerAppName=$CONTAINER_APP_NAME" >> $GITHUB_OUTPUT
        echo "Container App Name: $CONTAINER_APP_NAME"

    - name: Deploy to Azure Container Apps
      shell: bash
      run: |
        echo "Deploying image: ${{ inputs.containerImage }}"
        az containerapp update \
          --name ${{ steps.get-containerapp.outputs.containerAppName }} \
          --resource-group ${{ vars.RESOURCE_GROUP_NAME }} \
          --image ${{ inputs.containerImage }}

    - name: Get Container App URL
      shell: bash
      run: |
        FQDN=$(az containerapp show \
          --name ${{ steps.get-containerapp.outputs.containerAppName }} \
          --resource-group ${{ vars.RESOURCE_GROUP_NAME }} \
          --query properties.configuration.ingress.fqdn -o tsv)
        echo "Container App URL: https://$FQDN"
        echo "✅ Deployment successful!"

    - name: Logout and cleanup
      if: always()
      shell: bash
      run: |
        az logout
        az cache purge
        az account clear
