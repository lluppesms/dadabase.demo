# ------------------------------------------------------------------------------------------------------------------------
# Reusable Workflow: Scan SBOM for Vulnerabilities and Generate Report
# ------------------------------------------------------------------------------------------------------------------------
# This workflow downloads a previously generated SBOM artifact and scans it for known vulnerabilities
# using Grype (via anchore/scan-action). Results are:
#   - Displayed as a table summary in the workflow log
#   - Uploaded to the GitHub Security tab as a SARIF file
#   - Published as a workflow artifact (SARIF + styled HTML report)
#
# Pre-requisite: The SBOM artifact must have been generated by template-create-sbom.yml first.
#
# For more information on Grype, see: https://github.com/anchore/grype
# For more information on anchore/scan-action, see: https://github.com/anchore/scan-action
# ------------------------------------------------------------------------------------------------------------------------
# NOTE: To see the SARIF results in the Security tab, the repository must have
#   GitHub Advanced Security enabled (available for public repos and GHAS-licensed private repos).
#   Repository Settings -> Security -> Code security -> GitHub Advanced Security -> Enable
# ------------------------------------------------------------------------------------------------------------------------
name: z_template_sbom_report
run-name: SBOM Vulnerability Report

on:
  workflow_call:
    inputs:
      continueOnError:
        description: Continue workflow if the vulnerability scan fails
        required: false
        default: true
        type: boolean
      artifactName:
        description: Full name of the SBOM artifact to scan (must match the artifact-name used in template-create-sbom.yml, e.g. sbom.spdx.json)
        required: false
        default: 'sbom.spdx.json'
        type: string

# ------------------------------------------------------------------------------------------------------------------------
jobs:
  sbom-vulnerability-scan:
    name: SBOM Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # needed to upload SARIF to the Security tab
      actions: read            # needed to download workflow artifacts
      contents: read

    steps:
    - name: Download SBOM artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifactName }}
        path: .

    - name: Scan SBOM for vulnerabilities
      id: scan
      continue-on-error: ${{ inputs.continueOnError }}
      uses: anchore/scan-action@v3
      # See: https://github.com/anchore/scan-action
      with:
        sbom: sbom.spdx.json
        fail-build: false
        output-format: table

    - name: Upload vulnerability findings to Security tab
      if: always()
      continue-on-error: true
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ${{ steps.scan.outputs.sarif }}

    - name: Generate JSON report for HTML conversion
      if: always()
      continue-on-error: true
      shell: bash
      run: |
        curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
        grype sbom:sbom.spdx.json --output json > grype-results.json
        echo "JSON report generated ($(jq '.matches | length' grype-results.json 2>/dev/null || echo '?') matches)"

    - name: Generate HTML vulnerability report
      if: always()
      continue-on-error: true
      shell: bash
      run: |
        python3 - <<'PYTHON_SCRIPT'
        import json
        from datetime import datetime, timezone

        try:
            with open('grype-results.json') as f:
                data = json.load(f)
        except Exception as e:
            print(f"Could not read grype-results.json: {e}")
            data = {'matches': []}

        matches = data.get('matches', [])
        source_info = data.get('source', {}) or {}
        target = source_info.get('target', {}) or {}
        source_name = target.get('userInput', 'SBOM scan')

        sev_order = ['Critical', 'High', 'Medium', 'Low', 'Negligible', 'Unknown']
        sev_colors = {
            'Critical': '#9b2226', 'High': '#ae2012', 'Medium': '#ca6702',
            'Low': '#0a9396', 'Negligible': '#94d2bd', 'Unknown': '#868e96'
        }
        counts = {s: 0 for s in sev_order}
        for m in matches:
            sev = (m.get('vulnerability') or {}).get('severity', 'Unknown')
            if sev not in counts:
                sev = 'Unknown'
            counts[sev] += 1

        def sev_sort_key(m):
            sev = (m.get('vulnerability') or {}).get('severity', 'Unknown')
            return sev_order.index(sev) if sev in sev_order else len(sev_order)

        rows = []
        for m in sorted(matches, key=sev_sort_key):
            vuln = m.get('vulnerability') or {}
            artifact = m.get('artifact') or {}
            sev = vuln.get('severity', 'Unknown')
            if sev not in sev_colors:
                sev = 'Unknown'
            color = sev_colors[sev]
            fix_versions = ', '.join((vuln.get('fix') or {}).get('versions', [])) or '—'
            urls = vuln.get('urls') or []
            vuln_id = vuln.get('id', '')
            vuln_link = f'<a href="{urls[0]}" target="_blank" rel="noopener">{vuln_id}</a>' if urls else vuln_id
            description = (vuln.get('description') or '')[:200]
            if len(vuln.get('description') or '') > 200:
                description += '...'
            rows.append(f'<tr>'
                f'<td>{vuln_link}</td>'
                f'<td>{artifact.get("name", "")}</td>'
                f'<td>{artifact.get("version", "")}</td>'
                f'<td>{fix_versions}</td>'
                f'<td><span class="badge" style="background:{color}">{sev}</span></td>'
                f'<td class="desc">{description}</td>'
                f'</tr>')

        summary_headers = ''.join(f'<th>{s}</th>' for s in sev_order)
        summary_cells = ''.join(
            f'<td style="color:{sev_colors[s]};font-weight:bold;text-align:center">{counts[s]}</td>'
            for s in sev_order
        )
        rows_html = '\n'.join(rows) if rows else '<tr><td colspan="6" class="empty">✅ No vulnerabilities found</td></tr>'
        generated_at = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')

        html = f"""<!DOCTYPE html>
        <html lang="en">
        <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>SBOM Vulnerability Report</title>
          <style>
            body {{ font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 24px; background: #f8f9fa; color: #212529; }}
            h1 {{ margin-bottom: 4px; }}
            .meta {{ color: #6c757d; font-size: 0.9em; margin-bottom: 24px; }}
            h2 {{ color: #495057; border-bottom: 2px solid #dee2e6; padding-bottom: 8px; margin-top: 32px; }}
            table {{ border-collapse: collapse; width: 100%; background: white; box-shadow: 0 1px 3px rgba(0,0,0,.12); border-radius: 6px; overflow: hidden; margin-bottom: 24px; }}
            th {{ background: #343a40; color: white; padding: 10px 16px; text-align: left; font-weight: 600; }}
            td {{ padding: 9px 16px; border-bottom: 1px solid #e9ecef; vertical-align: top; }}
            tr:last-child td {{ border-bottom: none; }}
            tbody tr:hover td {{ background: #f1f3f5; }}
            .badge {{ color: white; padding: 2px 10px; border-radius: 12px; font-size: 0.8em; font-weight: 700; white-space: nowrap; }}
            .desc {{ font-size: 0.85em; color: #495057; max-width: 360px; }}
            .empty {{ text-align: center; padding: 24px; color: #6c757d; }}
            a {{ color: #0d6efd; text-decoration: none; }}
            a:hover {{ text-decoration: underline; }}
          </style>
        </head>
        <body>
          <h1>SBOM Vulnerability Report</h1>
          <p class="meta">Source: {source_name} &nbsp;|&nbsp; Generated: {generated_at} &nbsp;|&nbsp; Total findings: {len(matches)}</p>

          <h2>Summary by Severity</h2>
          <table>
            <thead><tr>{summary_headers}</tr></thead>
            <tbody><tr>{summary_cells}</tr></tbody>
          </table>

          <h2>Vulnerability Details ({len(matches)} total)</h2>
          <table>
            <thead>
              <tr>
                <th>CVE / ID</th>
                <th>Package</th>
                <th>Version</th>
                <th>Fixed In</th>
                <th>Severity</th>
                <th>Description</th>
              </tr>
            </thead>
            <tbody>
              {rows_html}
            </tbody>
          </table>
        </body>
        </html>"""

        with open('sbom-vulnerability-report.html', 'w') as f:
            f.write(html)
        print(f"✅ HTML report generated: {len(matches)} vulnerabilities across {len(rows)} findings")
        PYTHON_SCRIPT

    - name: Upload vulnerability reports as artifacts
      if: always()
      continue-on-error: true
      uses: actions/upload-artifact@v4
      with:
        name: sbom-vulnerability-report
        path: |
          ${{ steps.scan.outputs.sarif }}
          sbom-vulnerability-report.html
        retention-days: 90
