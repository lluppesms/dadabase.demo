# ------------------------------------------------------------------------------------------------------------------------
# GHA Workflow to deploy Azure Resources and Container App
# ------------------------------------------------------------------------------------------------------------------------
# This workflow deploys infrastructure with Container Apps and builds/deploys the containerized web application
# ------------------------------------------------------------------------------------------------------------------------
name: 2.2.bicep.build.deploy.containerapp
run-name: '2.2 - Deploy Bicep/Build & Deploy Container App: ${{ inputs.bicepDeploymentMode }} using ENV ${{ inputs.deployEnvironment }} ${{vars.INSTANCE_NUMBER}} by @${{ github.actor }}'

on: 
  workflow_dispatch:
    inputs:
      deployEnvironment:
        description: Environment
        default: 'dev' 
        type: environment
      createResourceGroup:
        description: Create Resource Group?
        type: boolean
        default: true
      runCreateInfra:
        description: Deploy Bicep
        default: true
        type: boolean
      bicepDeploymentMode:
        description: Bicep Mode
        default: create
        type: choice
        options:
          - create
          - whatIf
      runBuild:
        description: Build & Push Docker Image
        default: true
        type: boolean
      runDeploy:
        description: Deploy Container App
        default: true
        type: boolean
      runSecurityScan:
        description: Run Security Scan
        default: false
        type: boolean
      runSmokeTest:
        description: Run Smoke Tests
        default: false
        type: boolean
      logLevel:
        description: Log level
        required: false
        default: 'warning' 
        type: choice
        options:
          - info
          - warning
          - debug 

# ------------------------------------------------------------------------------------------------------------------------
permissions:
  id-token: write
  contents: write
  actions: read
  pages: write
  security-events: write
  checks: write
  issues: read
  pull-requests: read
  packages: read

# ------------------------------------------------------------------------------------------------------------------------
jobs:
  # ------------------------------------------------------------------------------------------------------------------------
  load-config:
    name: Load Project Config
    uses: ./.github/workflows/template-load-config.yml
    secrets: inherit

  # ------------------------------------------------------------------------------------------------------------------------
  scan-code:
    name: Scan Source Code
    uses: ./.github/workflows/template-scan-code.yml
    secrets: inherit
    if: inputs.runSecurityScan
    with:
      runMSDevSecOpsScan: ${{ inputs.runSecurityScan }}
      runGHASScan: ${{ inputs.runSecurityScan }}

  # ------------------------------------------------------------------------------------------------------------------------
  create-infra:
    name: Create Infra ${{ inputs.deployEnvironment }}
    uses: ./.github/workflows/template-deploy-bicep.yml
    secrets: inherit
    with:
      runCreateInfra: ${{ inputs.runCreateInfra }}
      envCode: ${{ inputs.deployEnvironment }}
      templatePath: './infra/Bicep/'
      templateFile: 'main.bicep'
      parameterFile: 'main.gha.bicepparam'
      parameterFileReplaceTokens: 'true'
      requestorName: ${{ github.actor }}
      createResourceGroup: ${{ inputs.createResourceGroup }}
      bicepDeploymentMode: ${{ inputs.bicepDeploymentMode }}

  # ------------------------------------------------------------------------------------------------------------------------
  build-container:
    name: Build Docker Image
    needs: [create-infra]
    uses: ./.github/workflows/template-containerapp-build.yml
    secrets: inherit
    if: inputs.runBuild
    with:
      envCode: ${{ inputs.deployEnvironment }}
      dockerfilePath: 'src/web/Dockerfile'
      dockerContext: 'src/web'
      imageName: 'dadabase-web'
      imageTag: 'latest'

  # ------------------------------------------------------------------------------------------------------------------------
  deploy-containerapp:
    name: Deploy Container App
    needs: [build-container]
    uses: ./.github/workflows/template-containerapp-deploy.yml
    secrets: inherit
    if: inputs.runDeploy
    with:
      envCode: ${{ inputs.deployEnvironment }}
      containerImage: ${{ needs.build-container.outputs.imageFullName }}

  # ------------------------------------------------------------------------------------------------------------------------
  smoke-test:
    name: Smoke Test ${{ inputs.deployEnvironment }}
    needs: [deploy-containerapp]
    uses: ./.github/workflows/template-smoke-test.yml
    secrets: inherit
    if: inputs.runSmokeTest
    with:
      envCode: ${{ inputs.deployEnvironment }}
      testPath: 'playwright/ui-tests'
      testType: 'ui'
